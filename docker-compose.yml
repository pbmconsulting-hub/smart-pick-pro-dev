version: "3.9"
services:
  app:
    build: .
    ports:
      - "8501:8501"
    env_file: .env
    volumes:
      - ./data:/app/data
      - app_db:/app/db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8501/_stcore/health')"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
  api:
    build: .
    command: ["uvicorn", "api.main:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./data:/app/data
      - app_db:/app/db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/docs')"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
  caddy:
    image: caddy:2
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
    depends_on:
      app:
        condition: service_healthy
      api:
        condition: service_healthy
volumes:
  caddy_data:
  app_db:
