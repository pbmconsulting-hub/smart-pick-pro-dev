name: Daily Predictions Pipeline

on:
  schedule:
    - cron: "0 14 * * *"  # 10:00 AM ET (14:00 UTC)
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run prediction pipeline
        run: |
          python -m engine.pipeline.run_pipeline
        env:
          LOG_LEVEL: INFO

      - name: Upload predictions artifact
        uses: actions/upload-artifact@v4
        with:
          name: predictions-${{ github.run_id }}
          path: data/processed/predictions_*.json
          if-no-files-found: warn
          retention-days: 30
